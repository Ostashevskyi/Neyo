name: E2E (Playwright Python)

on:
  push:
    branches: [ main, feat/**, integrate-CI ]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]   # add firefox, webkit if you want
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Build Next.js app ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Build Next.js
        run: npm run build --if-present

      - name: Start server
        run: |
          npm run start > .next/server.log 2>&1 &
          echo $! > app.pid

      

      - name: Wait for app (max 2 min)
        run: |
          npx -y wait-on@8 -t 120000 http-get://localhost:3000 || {
            echo "===== .next/server.log ====="
            sed -n '1,200p' .next/server.log || true
            exit 1
          }
      

      # ---- Python + Playwright (pytest) ----
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-playwright pytest-base-url
          python -m playwright install --with-deps

      - name: Make reports dir
        run: mkdir -p reports

      - name: Run Playwright tests (pytest)
        env:
          BASE_URL: "http://localhost:3000"
        run: |
          # If you have base_url in pytest.ini, no need to pass --base-url
          pytest -v \
            --browser=${{ matrix.browser }} \
            --tracing=retain-on-failure \
            --screenshot=only-on-failure \
            --video=retain-on-failure \
            --junitxml=reports/junit-${{ matrix.browser }}.xml

      - name: Print server log on failure
        if: failure()
        run: |
          echo "===== .next/server.log ====="
          tail -n +1 .next/server.log || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}
          path: |
            reports/
            test-results/
            playwright-report/
          if-no-files-found: ignore

      - name: Stop server
        if: always()
        run: |
          if [ -f app.pid ]; then kill "$(cat app.pid)" || true; fi
